<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fff;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 280px;
            background: #f9f9f9;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #f5f5f5;
        }

        .new-chat-btn svg {
            width: 16px;
            height: 16px;
        }

        .hide-archived {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .hide-archived svg {
            width: 14px;
            height: 14px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-left: 8px;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #f0f0f0;
        }

        .chat-item.active {
            background: #e8e8e8;
        }

        .chat-item svg {
            width: 18px;
            height: 18px;
            color: #666;
            flex-shrink: 0;
        }

        .chat-item span {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 右侧主区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-icon {
            width: 20px;
            height: 20px;
            color: #666;
        }

        .header-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        /* 消息区域 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message-content {
            background: #f9f9f9;
            padding: 20px 24px;
            border-radius: 8px;
            line-height: 1.6;
        }

        .message-content h3 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .message-content ul {
            list-style: disc;
            padding-left: 20px;
            margin-bottom: 16px;
        }

        .message-content li {
            margin-bottom: 8px;
            color: #444;
            font-size: 14px;
        }

        .message-content .summary-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 20px 0 12px;
        }

        .message-content .summary-title .pin {
            font-size: 20px;
        }

        .message-content blockquote {
            border-left: 3px solid #ddd;
            padding-left: 16px;
            margin: 12px 0;
            color: #666;
            font-size: 14px;
            line-height: 1.8;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #f0f0f0;
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid #e5e5e5;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #22c55e;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 48px;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: #999;
        }

        .input-hint {
            text-align: center;
            margin-top: 8px;
            font-size: 12px;
            color: #999;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <button class="new-chat-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New chat
            </button>
            
            <div class="hide-archived">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
                Hide Archived & Closed
            </div>
            
            <div class="section-label">Active</div>
            
            <div class="chat-list">
                <div class="chat-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                    <span>mockcraft</span>
                </div>
                <div class="chat-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                    <span>git & agent</span>
                </div>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="main">
            <!-- 顶部标题栏 -->
            <header class="header">
                <div class="header-left">
                    <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <div class="header-title">git & agent</div>
                <div></div>
            </header>

            <!-- 消息区域 -->
            <div class="messages">
                <div class="message">
                    <div class="message-content">
                        <h3>4. 自动记录决策历史</h3>
                        <ul>
                            <li>澄清过程本身就是文档</li>
                            <li>开发者可以看到"为什么这样设计"的完整脉络</li>
                        </ul>
                        
                        <div class="summary-title">
                            <span class="pin">📌</span>
                            一句话总结
                        </div>
                        
                        <blockquote>
                            MockCraft 不是让业务人员"设计"或"开发"，而是让他们在投入昂贵的开发资源之前。
                        </blockquote>
                        
                        <button class="copy-btn">
                            Copy
                        </button>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        class="message-input" 
                        placeholder="Message... (Paste image to attach)"
                        rows="1"
                    ></textarea>
                    <div class="input-hint">Cmd/Ctrl + Enter to send, Enter for new line</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 简单的输入框自动高度调整
        const textarea = document.querySelector('.message-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Copy 按钮点击效果
        document.querySelector('.copy-btn').addEventListener('click', function() {
            const originalText = this.textContent;
            this.textContent = 'Copied!';
            setTimeout(() => {
                this.textContent = originalText;
            }, 1500);
        });

        // 聊天项点击切换
        document.querySelectorAll('.chat-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                document.querySelector('.header-title').textContent = this.querySelector('span').textContent;
            });
        });
    </script>
</body>
</html>
